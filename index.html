<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic EQ Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>🎓 AC</h1>
            <p>Monitor your mind, master your grades.</p>
        </header>

        <section class="stats-container">
            <div class="stat-card">
                <h3>Avg Mood</h3>
                <span id="avg-mood">-</span>
            </div>
            <div class="stat-card">
                <h3>Avg Stress</h3>
                <span id="avg-stress">-</span>
            </div>
            <div class="stat-card" id="alert-box">
                <h3>Status</h3>
                <span id="status-text">No Data</span>
            </div>
        </section>

        <section class="input-section">
            <h2>📝 Daily Check-in</h2>
            <form id="tracker-form">
                <div class="form-group">
                    <label for="subject">Academic Focus (Subject/Task)</label>
                    <input type="text" id="subject" placeholder="e.g. Physics Revision" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="mood">Mood (1=Low, 10=High)</label>
                        <input type="number" id="mood" min="1" max="10" required>
                    </div>
                    <div class="form-group">
                        <label for="stress">Stress (1=Calm, 10=Panic)</label>
                        <input type="number" id="stress" min="1" max="10" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="notes">Quick Reflection</label>
                    <input type="text" id="notes" placeholder="How are you feeling about this work?">
                </div>

                <button type="submit">Log Entry</button>
            </form>
        </section>

        <section class="history-section">
            <h2>📅 Recent Logs</h2>
            <ul id="log-list">
                </ul>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
